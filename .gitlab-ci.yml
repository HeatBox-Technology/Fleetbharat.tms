image: docker:24

services:
  - docker:24-dind

variables:
  DOCKER_TLS_CERTDIR: ""
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

stages:
  - build
  - deploy

before_script:
  - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
build_and_push:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - docker build -t $DOCKER_IMAGE_NAME:$IMAGE_TAG .
    - docker tag $DOCKER_IMAGE_NAME:$IMAGE_TAG $DOCKER_IMAGE_NAME:latest
    - docker push $DOCKER_IMAGE_NAME:$IMAGE_TAG
    - docker push $DOCKER_IMAGE_NAME:latest

deploy_to_ec2:
  stage: deploy
  image: alpine:latest
  needs:
    - build_and_push
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache openssh
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$EC2_USER@$EC2_HOST" "
        docker pull $DOCKER_IMAGE_NAME:$IMAGE_TAG &&
        docker rm -f fleetbharat-tms || true &&
        docker run -d \
          --name fleetbharat-tms \
          --network fleetbharat-net \
          -p 8081:8081 \
          -v /var/www/fleetbharat/uploads:/app/uploads \
          -e ASPNETCORE_ENVIRONMENT=Production \
          -e ASPNETCORE_URLS=http://+:8081 \
          -e ConnectionStrings__Default='$PROD_CONN' \
          --restart always \
          $DOCKER_IMAGE_NAME:$IMAGE_TAG
      "
